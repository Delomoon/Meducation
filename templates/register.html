{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<form class="auth-form" method="post">
    <h2>Регистрация</h2>
    <label align="left">Имя пользователя <input name="username" required /></label>
    <label align="left">Пароль <input type="password" name="password" required /></label>
    <button type="submit">Создать аккаунт</button>
    <a href="/login" style="text-decoration: none; color: #283785;">Уже есть аккаунт? Войти</a>
</form>
{% endblock %}
